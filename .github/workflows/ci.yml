name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run prettier:check

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run ts

      - name: Check spelling
        run: pnpm run check-spelling

      - name: Run tests
        run: pnpm run test

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Install fixture dependencies
        run: pnpm install --frozen-lockfile
        working-directory: fixtures/minimal

      - name: Run e2e tests
        run: bash run-e2e.sh
        working-directory: fixtures/minimal
